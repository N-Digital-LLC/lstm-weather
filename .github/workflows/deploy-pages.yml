name: Deploy results site to GitHub Pages

# Builds the backend-free static results site (frontend) and publishes it to
# GitHub Pages so examiners can open it via a URL — no download or install.
# Re-run trigger: Pages enabled in repo settings.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci

      - name: Build static export (subpath = repo name)
        run: npm run build:static
        env:
          NEXT_PUBLIC_STATIC: "1"
          # Project Pages serve under /<repo>; must match the repository name.
          NEXT_PUBLIC_BASE_PATH: "/${{ github.event.repository.name }}"

      # Stop GitHub Pages from running Jekyll, which would drop the _next folder.
      - run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
